<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular Background -->
  <circle cx="100" cy="100" r="95" fill="#0a0012" stroke="#d4af37" stroke-width="2"/>
  
  <!-- Outer Glow -->
  <circle cx="100" cy="100" r="98" stroke="#d4af37" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Top Text Path -->
  <path id="topTextPath" d="M 40 100 A 60 60 0 0 1 160 100" fill="transparent" />
  <text font-family="'Inter', sans-serif" font-size="18" font-weight="900" fill="#d4af37" letter-spacing="2">
    <textPath href="#topTextPath" startOffset="50%" text-anchor="middle">SLICK TRENDS</textPath>
  </text>

  <!-- Bottom Text Path -->
  <path id="bottomTextPath" d="M 30 100 A 70 70 0 0 0 170 100" fill="transparent" />
  <text font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#b8a9d0" letter-spacing="1.5">
    <textPath href="#bottomTextPath" startOffset="50%" text-anchor="middle">QUALITY ROBES AND ONESIES</textPath>
  </text>

  <!-- Central Illustrations -->
  <!-- Robe (Left) -->
  <g transform="translate(55, 75) scale(0.6)">
    <!-- Hanger -->
    <path d="M 25 5 Q 25 0 30 0 Q 35 0 35 5 Q 35 10 30 10 M 10 20 L 50 20" stroke="#d4af37" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Robe Body -->
    <path d="M 15 20 L 5 80 L 55 80 L 45 20 Z" fill="#d4af37"/>
    <path d="M 30 20 L 30 80" stroke="#0a0012" stroke-width="2"/>
    <path d="M 15 50 L 45 50" stroke="#0a0012" stroke-width="2"/>
  </g>

  <!-- Onesie (Right) -->
  <g transform="translate(100, 75) scale(0.6)">
    <!-- Hood -->
    <path d="M 15 20 Q 30 0 45 20" stroke="#d4af37" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M 15 20 L 10 60 L 25 80 L 35 80 L 50 60 L 45 20 Z" fill="#d4af37"/>
    <!-- Zipper/Detail -->
    <path d="M 30 20 L 30 65" stroke="#0a0012" stroke-width="2"/>
  </g>
  
  <!-- Decorative Dots -->
  <circle cx="45" cy="100" r="2" fill="#d4af37"/>
  <circle cx="155" cy="100" r="2" fill="#d4af37"/>
</svg>
